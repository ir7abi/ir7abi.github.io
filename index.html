<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mohamed Irhabi</title>
  <meta name="description" content="The personal site of Mohamed Irhabi — pre-medical scholar, researcher, and writer." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter+Tight:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-landing">

  <div class="grain" aria-hidden="true"></div>

  <main class="desk">

    <!-- Header inscription, top-left like a plaque -->
    <header class="plaque">
      <h1 class="plaque__name">
        <span>Mohamed</span>
        <span class="plaque__italic">Irhabi</span>
      </h1>
      <p class="plaque__sub">— a desk, briefly arranged. —</p>
    </header>

    <!-- The four objects -->
    <section class="objects" aria-label="Navigation">

      <!-- ─────────── 1. STETHOSCOPE → Research ─────────── -->
      <a href="research.html" class="object object--stethoscope" data-label="Research">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <!-- Earpieces -->
            <path d="M55 35 Q 50 28, 45 30 Q 40 32, 42 38" />
            <path d="M145 35 Q 150 28, 155 30 Q 160 32, 158 38" />
            <!-- Ear tubes curving down -->
            <path d="M55 35 Q 60 60, 75 80" />
            <path d="M145 35 Q 140 60, 125 80" />
            <!-- Y-junction -->
            <path d="M75 80 Q 100 95, 125 80" />
            <!-- Tube down to chestpiece, looped naturally -->
            <path d="M100 95 Q 105 110, 115 120 Q 130 132, 140 145 Q 148 158, 140 168" />
            <!-- Chestpiece (bell + diaphragm) -->
            <circle cx="135" cy="172" r="14" />
            <circle cx="135" cy="172" r="9" />
            <circle cx="135" cy="172" r="2" fill="currentColor" />
            <!-- Tiny detail dots on earpieces -->
            <circle cx="42" cy="32" r="2" fill="currentColor" />
            <circle cx="158" cy="32" r="2" fill="currentColor" />
          </g>
        </svg>
        <span class="object__label">
          <span class="object__roman">I.</span>
          <span class="object__name">Research</span>
        </span>
      </a>

      <!-- ─────────── 2. MICROSCOPE → Medicine & Service ─────────── -->
      <a href="medicine.html" class="object object--microscope" data-label="Medicine &amp; Service">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <!-- Base -->
            <path d="M50 175 L 150 175 L 145 165 L 55 165 Z" />
            <!-- Stage arm rising from base -->
            <path d="M75 165 L 75 130" />
            <path d="M75 130 L 110 130" />
            <!-- Stage (with slide hint) -->
            <rect x="65" y="125" width="50" height="6" rx="1" />
            <line x1="80" y1="128" x2="100" y2="128" />
            <!-- Vertical column / focus knobs -->
            <path d="M75 130 L 75 70" />
            <circle cx="65" cy="100" r="5" />
            <circle cx="65" cy="115" r="3" />
            <!-- Curved arm to objective -->
            <path d="M75 70 Q 90 60, 110 65" />
            <!-- Objective lens turret -->
            <circle cx="115" cy="80" r="10" />
            <line x1="115" y1="90" x2="115" y2="100" />
            <circle cx="115" cy="105" r="3" />
            <!-- Eyepiece tube going up -->
            <path d="M105 65 L 105 35 L 130 35 L 130 50" />
            <!-- Eyepiece -->
            <ellipse cx="117" cy="32" rx="14" ry="4" />
            <!-- Light/decorative dot -->
            <circle cx="100" cy="170" r="1.5" fill="currentColor" />
          </g>
        </svg>
        <span class="object__label">
          <span class="object__roman">II.</span>
          <span class="object__name">Medicine &amp; Service</span>
        </span>
      </a>

      <!-- ─────────── 3. JOURNAL & PEN → Writing ─────────── -->
      <a href="writing.html" class="object object--journal" data-label="Writing">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <!-- Open book — left page -->
            <path d="M30 60 Q 28 58, 30 56 L 95 50 L 100 60 L 100 165 L 95 168 L 30 162 Z" />
            <!-- Open book — right page -->
            <path d="M170 60 Q 172 58, 170 56 L 105 50 L 100 60 L 100 165 L 105 168 L 170 162 Z" />
            <!-- Spine arch -->
            <path d="M100 60 Q 100 55, 95 50" />
            <path d="M100 60 Q 100 55, 105 50" />
            <!-- Handwritten lines on left page -->
            <path d="M40 80 Q 60 78, 85 82" />
            <path d="M40 95 Q 65 93, 88 96" />
            <path d="M40 110 Q 55 108, 80 112" />
            <path d="M40 125 Q 70 122, 90 126" />
            <path d="M40 140 Q 60 138, 78 142" />
            <!-- Handwritten lines on right page -->
            <path d="M115 82 Q 140 80, 162 84" />
            <path d="M112 97 Q 138 95, 160 99" />
            <path d="M115 112 Q 142 110, 164 114" />
            <path d="M112 127 Q 135 125, 158 129" />
            <!-- Fountain pen lying diagonally across the right page -->
            <line x1="125" y1="155" x2="180" y2="105" stroke-width="2" />
            <!-- Pen nib -->
            <path d="M180 105 L 184 100 L 187 103 L 183 108 Z" fill="currentColor" stroke="none" />
            <!-- Pen cap accent -->
            <line x1="135" y1="145" x2="142" y2="151" />
          </g>
        </svg>
        <span class="object__label">
          <span class="object__roman">III.</span>
          <span class="object__name">Writing</span>
        </span>
      </a>

      <!-- ─────────── 4. PRAYER BEADS → Faith & Community ─────────── -->
      <a href="faith.html" class="object object--beads" data-label="Faith &amp; Community">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <!-- Misbaha laid in a soft loop on the desk -->
            <!-- Main loop (open ring, slightly tilted) -->
            <ellipse cx="100" cy="105" rx="55" ry="42" />

            <!-- Beads around the loop, drawn at angles -->
            <!-- Top beads -->
            <circle cx="100" cy="63" r="3.5" fill="currentColor" />
            <circle cx="115" cy="64" r="3.5" fill="currentColor" />
            <circle cx="85"  cy="64" r="3.5" fill="currentColor" />
            <circle cx="130" cy="68" r="3.5" fill="currentColor" />
            <circle cx="70"  cy="68" r="3.5" fill="currentColor" />
            <circle cx="143" cy="75" r="3.5" fill="currentColor" />
            <circle cx="57"  cy="75" r="3.5" fill="currentColor" />
            <!-- Side beads -->
            <circle cx="152" cy="88" r="3.5" fill="currentColor" />
            <circle cx="48"  cy="88" r="3.5" fill="currentColor" />
            <circle cx="155" cy="105" r="3.5" fill="currentColor" />
            <circle cx="45"  cy="105" r="3.5" fill="currentColor" />
            <circle cx="152" cy="122" r="3.5" fill="currentColor" />
            <circle cx="48"  cy="122" r="3.5" fill="currentColor" />
            <!-- Bottom beads -->
            <circle cx="143" cy="135" r="3.5" fill="currentColor" />
            <circle cx="57"  cy="135" r="3.5" fill="currentColor" />
            <circle cx="130" cy="142" r="3.5" fill="currentColor" />
            <circle cx="70"  cy="142" r="3.5" fill="currentColor" />
            <circle cx="115" cy="146" r="3.5" fill="currentColor" />
            <circle cx="85"  cy="146" r="3.5" fill="currentColor" />
            <!-- Imam (leader) bead — larger, at the bottom join -->
            <ellipse cx="100" cy="148" rx="5" ry="6" fill="currentColor" />
            <!-- Tassel hanging down from imam bead -->
            <line x1="100" y1="154" x2="100" y2="170" />
            <line x1="100" y1="170" x2="96" y2="178" />
            <line x1="100" y1="170" x2="100" y2="180" />
            <line x1="100" y1="170" x2="104" y2="178" />
          </g>
        </svg>
        <span class="object__label">
          <span class="object__roman">IV.</span>
          <span class="object__name">Faith &amp; Community</span>
        </span>
      </a>

    </section>

    <!-- Tiny instruction at the bottom -->
    <footer class="instruction">
      <p>Hover any object · Click to enter</p>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
